<svg xmlns="http://www.w3.org/2000/svg" width="300" height="600" viewBox="0 0 300 600">
  <rect width="300" height="600" rx="24" fill="#1a1a2e"/>
  <rect x="4" y="4" width="292" height="592" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Status bar -->
  <rect x="100" y="12" width="100" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
  <!-- Album art placeholder -->
  <rect x="50" y="60" width="200" height="200" rx="12" fill="#ffffff" opacity="0.06"/>
  <!-- Track info -->
  <rect x="50" y="285" width="160" height="16" rx="4" fill="#ffffff" opacity="0.10"/>
  <rect x="50" y="310" width="100" height="12" rx="3" fill="#ffffff" opacity="0.06"/>
  <!-- Progress bar -->
  <rect x="30" y="355" width="240" height="4" rx="2" fill="#ffffff" opacity="0.08"/>
  <rect x="30" y="355" width="100" height="4" rx="2" fill="#1D9BF0" opacity="0.4"/>
  <rect x="30" y="368" width="30" height="10" rx="3" fill="#ffffff" opacity="0.06"/>
  <rect x="240" y="368" width="30" height="10" rx="3" fill="#ffffff" opacity="0.06"/>
  <!-- Controls -->
  <rect x="55" y="405" width="30" height="30" rx="6" fill="#ffffff" opacity="0.06"/>
  <rect x="105" y="395" width="40" height="40" rx="20" fill="#ffffff" opacity="0.10"/>
  <rect x="130" y="395" width="40" height="40" rx="20" fill="#ffffff" opacity="0.12"/>
  <rect x="190" y="395" width="40" height="40" rx="20" fill="#ffffff" opacity="0.10"/>
  <rect x="215" y="405" width="30" height="30" rx="6" fill="#ffffff" opacity="0.06"/>
  <!-- Label -->
  <rect x="85" y="270" width="130" height="36" rx="8" fill="#1D9BF0" opacity="0.15"/>
  <text x="150" y="294" font-family="sans-serif" font-size="16" font-weight="600" fill="#1D9BF0" text-anchor="middle">Now Playing</text>
  <!-- Volume -->
  <rect x="30" y="465" width="240" height="4" rx="2" fill="#ffffff" opacity="0.06"/>
  <!-- Bottom items -->
  <rect x="30" y="500" width="24" height="24" rx="4" fill="#ffffff" opacity="0.06"/>
  <rect x="246" y="500" width="24" height="24" rx="4" fill="#ffffff" opacity="0.06"/>
</svg>
