  <!-- Bottom nav bar -->
  <rect x="0" y="555" width="300" height="45" rx="0" fill="#ffffff" opacity="0.04"/>
  <rect x="30" y="568" width="24" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
  <rect x="90" y="568" width="24" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
  <rect x="186" y="568" width="24" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
  <rect x="246" y="568" width="24" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
