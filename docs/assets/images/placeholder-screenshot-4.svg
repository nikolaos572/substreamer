  <rect x="20" y="430" width="260" height="40" rx="6" fill="#ffffff" opacity="0.04"/>
  <rect x="20" y="478" width="260" height="40" rx="6" fill="#ffffff" opacity="0.04"/>
  <rect x="20" y="526" width="260" height="40" rx="6" fill="#ffffff" opacity="0.04"/>
