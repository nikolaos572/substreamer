<svg xmlns="http://www.w3.org/2000/svg" width="300" height="600" viewBox="0 0 300 600">
  <rect width="300" height="600" rx="24" fill="#1a1a2e"/>
  <rect x="4" y="4" width="292" height="592" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Status bar -->
  <rect x="100" y="12" width="100" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
  <!-- Back button -->
  <rect x="20" y="40" width="24" height="24" rx="4" fill="#ffffff" opacity="0.08"/>
